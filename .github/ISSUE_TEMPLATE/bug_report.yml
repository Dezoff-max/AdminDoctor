name: Bug Report
description: Report a problem with AdminDoctor
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include real serial numbers, usernames, hostnames, Wi-Fi SSIDs, private IPs, tokens, passwords, or company identifiers.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: Use sanitized sample data only.
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS Version
      placeholder: "Example: 15.5"
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
